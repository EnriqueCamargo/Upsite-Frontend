<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Iniciar sesión</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="auth-container">
    
    <div class="auth-card">
        <h2>Iniciar sesión</h2>

        <div style="text-align: left;">
            <p><strong>Ingrese su correo</strong></p>
            <input type="text" placeholder="Correo">

            <p><strong>Ingrese su contraseña</strong></p>
            <input type="password" placeholder="Contraseña">
        </div>

        <p>
            <a href="recovery.html" style="color: #0b2a6f; font-size: 12px; text-decoration: none;">
                ¿Has olvidado tu correo electrónico u contraseña?
            </a>
        </p>

        <button onclick="location.href='home.html'">Iniciar sesión</button>
    </div>

</body>
</html>
