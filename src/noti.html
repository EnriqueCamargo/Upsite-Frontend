<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notificaciones - Upsite</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <nav class="barralateral">
        <div class="logo-container">
            <div class="logo-bg">
                <img src="imagenes/Logo_UPSIN_y_LETRAS-vertical.png" alt="Logo UPSIN">
            </div>
            <h1 class="brand-title">UPSITE</h1>
        </div>

        <ul class="linkspantallas">
            <li><a href="">Inicio</a></li>
            <li><a href="perfil.html">Perfil</a></li>
            <li><a href="">Explorar</a></li>
            <li><a href="noti.html" class="active">Notificaciones</a></li>
            <li><a href="denuncias.html">Denuncias</a></li>
        </ul>
    
        <div class="perfilusuario">
            <div class="user-info">
                <p class="user-name">Nombre Usuario</p>
                <p class="user-specialty">Ing. Tecnologías de la Información</p>
                <button class="btn-logout">Cerrar sesión</button>
            </div>
        </div>
    </nav>

    <main class="main-content">
        <div class="notifications-card">
            <header class="card-header">
                <h2>Notificaciones</h2>
            </header>

            <div class="notifications-list">
                
                <div class="notification-item alert">
                    <div class="notif-icon-container">
                        <div class="warning-circle">!</div>
                    </div>
                    <div class="notif-text">
                        <p>¡10 denuncias en esta publicación!</p>
                    </div>
                    <div class="notif-media-preview">
                        <span>imagen/video</span>
                    </div>
                </div>

                <div class="notification-item alert">
                    <div class="notif-icon-container">
                        <div class="warning-circle">!</div>
                    </div>
                    <div class="notif-text">
                        <p>¡20 Denuncias a este usuario!</p>
                    </div>
                    <div class="notif-avatar-preview">👤</div>
                </div>

                <div class="notification-item follow">
                    <div class="notif-avatar">
                        <img src="imagenes/default-user.png" alt="User">
                    </div>
                    <div class="notif-text">
                        <p><strong>Nombre @nombre</strong> comenzó a seguirte</p>
                    </div>
                    <div class="notif-media-preview tilt-right">
                        <span>imagen/video</span>
                    </div>
                </div>
