<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfil-Upsite</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <nav class="barralateral">
        <div class="logo-container">
            <div class="logo-bg">
                <img src="imagenes/Logo_UPSIN_y_LETRAS-vertical.png" alt="Logo UPSIN">
            </div>
            <h1 class="brand-title">UPSITE</h1>
        </div>

        <ul class="linkspantallas">
            <li><a href="">Inicio</a></li>
            <li><a href="perfil.html" class="active">Perfil</a></li>
            <li><a href="">Explorar</a></li>
            <li><a href="noti.html">Notificaciones</a></li>
            <li><a href="denuncias.html">Denuncias</a></li>
        </ul>
    
        <div class="perfilusuario">
            <div class="user-info">
                <p class="user-name">Nombre Usuario</p>
                <p class="user-specialty">Ing. Tecnologías de la Información</p>
                <button class="btn-logout">Cerrar sesión</button>
            </div>
        </div>
    </nav> <main class="main-content"> 
        <div class="profile-card">
            <div class="profile-banner" style="background: linear-gradient(to right, #800080, #ff00ff);">
                </div>

            <div class="profile-header">
                <div class="profile-avatar">
                    <img src="imagenes/fotodeperfil.webp" alt="Foto de perfil">
                </div>
                <div class="profile-info">
                    <h2>Nombre Apellido</h2>
                    <span class="role-badge">Estudiante</span>
                    <p class="username">@nombre</p>
                </div>
            </div>

            <div class="profile-details">
                <p><strong>Estudiante | 5-1 | Tecnologías de la Información</strong></p>
                <div class="stats">
                    <span><strong>567</strong> Siguiendo</span>
                    <span><strong>1234</strong> Seguidores</span>
                    <span><strong>1</strong> Publicaciones</span>
                </div>
            </div>

            <div class="profile-feed">
                </div>
        </div>
    </main>
</body>
